<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        #preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000000; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease-out, visibility 0.8s ease-out; }
        .loader-text { color: #ffffff; font-family: 'Syncopate', sans-serif, Arial; font-size: 20px; letter-spacing: 12px; text-transform: uppercase; font-weight: 700; animation: pulse 1s infinite alternate; margin-left: 12px; }
        @keyframes pulse { 0% { opacity: 0.2; filter: blur(2px); } 100% { opacity: 1; filter: blur(0); } }
        body.loaded #preloader { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>
    <div id="preloader"><div class="loader-text">RETROO</div></div>

    <div class="announcement">
        <div class="marquee">
            * EXCLUSIVE NEW DROPS * LIMITED QUANTITIES AVAILABLE * EXCLUSIVE NEW DROPS * LIMITED QUANTITIES AVAILABLE *
        </div>
    </div>
    
    <nav class="navbar">
        <div class="nav-left">
            <a href="/" aria-label="Home"><i class="ph-thin ph-house"></i></a>
        </div>
        <div class="logo" style="cursor:pointer; flex:1; text-align:center;" onclick="window.location.href='/'">RETROO</div>
        <div class="nav-right">
            <a href="/cart" aria-label="Cart"><i class="ph-thin ph-shopping-bag"></i></a>
        </div>
    </nav>

    <section class="section-title" style="padding: 40px 20px 20px;">
        <h1 style="font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 6px; text-transform: uppercase;">New Drops</h1>
        <p style="margin-top: 10px;">The latest precision-engineered pieces. Secure yours before they're gone.</p>
    </section>

    <div class="product-grid" id="new-drops-grid"></div>

    <footer class="footer" style="margin-top: 60px;">
        <div class="logo footer-logo" style="text-align:center;">RETROO</div>
        <div class="footer-bottom">&copy; 2026 RETROO WORLDWIDE. ALL RIGHTS RESERVED.</div>
    </footer>

    <script src="/products.js" defer></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(() => { document.body.classList.add('loaded'); }, 500);
        });
    </script>
</body>
</html>
