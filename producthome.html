<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .btn { background: transparent; color: #fff; border: 1px solid #fff; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;}
        .btn:hover { background: #fff; color: #000; }
        #preloader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.6s ease-out; }
        body.loaded #preloader { opacity: 0; visibility: hidden; }
        @media (min-width: 768px) { .split-view { display: flex; } .split-image, .split-text { flex: 1; } }
    </style>
</head>
<body>
    <div id="preloader"><div style="color:#fff; font-family:'Syncopate'; font-weight:700; letter-spacing:10px;">RETROO</div></div>

    <nav class="navbar">
        <div class="nav-left"><a onclick="history.back()"><i class="ph-thin ph-arrow-left" style="cursor:pointer;"></i></a></div>
        <div class="logo" style="flex:1; text-align:center;">RETROO</div>
        <div class="nav-right"><a href="/cart"><i class="ph-thin ph-shopping-bag"></i></a></div>
    </nav>

    <div id="product-home-container" class="split-view"></div>

    <script src="/products.js" charset="UTF-8" defer></script>
    <script>window.addEventListener('load', () => setTimeout(() => document.body.classList.add('loaded'), 300));</script>
</body>
</html>
